<!DOCTYPE html>
<html>
<head>
  <title>AI Broker</title>
  <style>
    body {
      margin: 0;
      background-color: #0e0e0e;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    h1 {
      padding: 20px;
    }
  </style>
</head>
<body>

<h1>AI Broker Platform</h1>

<div class="tradingview-widget-container">
  <div id="tradingview_chart"></div>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    new TradingView.widget({
      "width": "100%",
      "height": 600,
      "symbol": "BINANCE:BTCUSDT",
      "interval": "15",
      "theme": "dark",
      "style": "1",
      "locale": "ru",
      "container_id": "tradingview_chart"
    });
  </script>
</div>

</body>
</html>
