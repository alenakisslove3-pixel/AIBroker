<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Broker</title>

<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  background:#0e111a;
  color:white;
  font-family:Arial, sans-serif;
}

/* AUTH SCREEN */
#authScreen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0e111a;
}

.auth-box{
  background:#161b22;
  padding:30px;
  width:320px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.auth-box h2{
  margin-top:0;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:6px;
  border:1px solid #333;
  background:#1f2937;
  color:white;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  margin-bottom:10px;
}

.login{
  background:#2962ff;
  color:white;
}

.register{
  background:#10b981;
  color:black;
}

.logout{
  background:#ff4d4d;
  color:white;
  width:150px;
  margin:10px;
}

/* APP */
#app{
  display:none;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:#161b22;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <h2>AI Broker Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="login" onclick="login()">Login</button>
    <button class="register" onclick="register()">Register</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <h3>AI Broker</h3>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
  <div id="chart" style="height:600px;"></div>
</div>

<script>
// ===== SUPABASE CONNECT =====
const supabaseClient = supabase.createClient(
  "https://rixkswgfzzheeepzzell.supabase.co",
  "sb_publishable_Vp9Eq6BmzEMg60wEjFbUJA_lwNtAu74"
);

// ===== REGISTER =====
async function register(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Введите email и пароль");
    return;
  }

  const { error } = await supabaseClient.auth.signUp({
    email: email,
    password: password
  });

  if(error){
    alert(error.message);
  } else {
    alert("Регистрация успешна! Проверь почту.");
  }
}

// ===== LOGIN =====
async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Введите email и пароль");
    return;
  }

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error){
    alert(error.message);
  } else {
    showApp();
  }
}

// ===== LOGOUT =====
async function logout(){
  await supabaseClient.auth.signOut();
  location.reload();
}

// ===== SHOW APP =====
function showApp(){
  document.getElementById("authScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  new TradingView.widget({
    width:"100%",
    height:600,
    symbol:"BINANCE:BTCUSDT",
    interval:"15",
    theme:"dark",
    style:"1",
    locale:"ru",
    container_id:"chart"
  });
}

// ===== CHECK SESSION ON LOAD =====
supabaseClient.auth.getSession().then(({data})=>{
  if(data.session){
    showApp();
  }
});
</script>

</body>
</html>
