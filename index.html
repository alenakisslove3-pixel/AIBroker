<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI Broker</title>

<script src="https://s3.tradingview.com/tv.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#0e111a;
  color:white;
  font-family:Arial;
  margin:0;
}
#authScreen{
  position:fixed;
  inset:0;
  background:#0e111a;
  display:flex;
  align-items:center;
  justify-content:center;
}
.auth-box{
  background:#161b22;
  padding:30px;
  width:300px;
  border-radius:8px;
}
input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#1f2937;
  border:1px solid #333;
  color:white;
}
button{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  cursor:pointer;
}
.login{background:#2962ff;color:white;}
.register{background:#10b981;color:black;}
</style>
</head>

<body>

<div id="authScreen">
  <div class="auth-box">
    <h2>AI Broker Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="login" onclick="login()">Login</button>
    <button class="register" onclick="register()">Register</button>
  </div>
</div>

<div id="app" style="display:none;">
  <h2 style="padding:10px;">Добро пожаловать</h2>
  <button onclick="logout()">Logout</button>
  <div id="chart" style="height:500px;"></div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://rixkswgfzzheeepzzell.supabase.co",
  "sb_publishable_Vp9Eq6BmzEMg60wEjFbUJA_lwNtAu74"
);

async function register(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({
    email: email,
    password: password
  });

  if(error){
    alert(error.message);
  } else {
    alert("Регистрация успешна! Проверь почту.");
  }
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error){
    alert(error.message);
  } else {
    showApp();
  }
}

async function logout(){
  await supabaseClient.auth.signOut();
  location.reload();
}

function showApp(){
  document.getElementById("authScreen").style.display="none";
  document.getElementById("app").style.display="block";

  new TradingView.widget({
    width:"100%",
    height:500,
    symbol:"BINANCE:BTCUSDT",
    interval:"15",
    theme:"dark",
    container_id:"chart"
  });
}

supabaseClient.auth.getSession().then(({data})=>{
  if(data.session){
    showApp();
  }
});
</script>

</body>
</html>
