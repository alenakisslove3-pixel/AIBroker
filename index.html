<!DOCTYPE html>
<html>
<head>
  <title>AI Broker</title>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <style>
    body {
      margin: 0;
      background-color: #0b0f1a;
      font-family: Arial, sans-serif;
      color: white;
    }

    .topbar {
      background: #111827;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .balance {
      font-size: 18px;
      font-weight: bold;
      color: #00ff99;
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 12px 25px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
    }

    .buy {
      background: #00c853;
      color: white;
    }

    .sell {
      background: #d50000;
      color: white;
    }

    #chart {
      height: 80vh;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>AI Broker Platform</div>
  <div class="balance">Balance: $10,000</div>
  <div class="buttons">
    <button class="buy">BUY</button>
    <button class="sell">SELL</button>
  </div>
</div>

<div id="chart"></div>

<script>
  new TradingView.widget({
    "width": "100%",
    "height": "100%",
    "symbol": "BINANCE:BTCUSDT",
    "interval": "15",
    "theme": "dark",
    "style": "1",
    "locale": "ru",
    "container_id": "chart"
  });
</script>

</body>
</html>
